<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beautiya — Hannah</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0A0A0A;--surface:#141414;--text:#E8E8E8;--text-muted:#777;--accent:#6C63FF;--border:rgba(255,255,255,.07);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;line-height:1.6;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:22px 80px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,10,10,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
    .nav-logo{font-size:22px;font-weight:700;letter-spacing:-.04em;color:var(--text);text-decoration:none;}
    .back{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s,gap .2s;}
    .back:hover{color:var(--text);gap:12px;}
    .hero{padding:160px 0 80px;border-bottom:1px solid var(--border);}
    .hero-inner{max-width:1440px;margin:0 auto;padding:0 160px;}
    .cs-cat{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:block;}
    .cs-title{font-size:clamp(36px,5vw,64px);font-weight:700;line-height:1.1;letter-spacing:-.03em;margin-bottom:48px;max-width:800px;}
    .cs-meta{display:flex;flex-wrap:wrap;gap:48px;padding-top:40px;border-top:1px solid var(--border);}
    .meta-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
    .meta-value{font-size:15px;font-weight:500;}
    .gallery{padding:0 160px 120px; max-width:1440px; margin:0 auto;}
    .gallery img{width:100%;display:block;opacity:0;filter:blur(8px);transform:translateY(20px) scale(.98);transition:opacity .65s cubic-bezier(.34,1.56,.64,1),filter .65s,transform .65s cubic-bezier(.34,1.56,.64,1);}
    .gallery img.in{opacity:1;filter:blur(0);transform:translateY(0) scale(1);}
    footer{padding:36px 80px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .foot-copy{font-size:11px;color:var(--text-muted);}
    .foot-back{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);text-decoration:none;transition:color .2s;}
    .foot-back:hover{color:var(--text);}
    @media(max-width:768px){nav{padding:18px 24px;}.hero{padding:100px 0 48px;}.hero-inner{padding:0 24px;}.gallery{padding:0 24px 80px;}footer{padding:28px 24px;flex-direction:column;gap:16px;text-align:center;}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Hannah</a>

    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">

<script>
  const imgs = document.querySelectorAll('.gallery img');
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
  },{threshold:.08});
  imgs.forEach(img=>io.observe(img));
</script>
